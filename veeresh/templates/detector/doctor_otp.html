{% extends 'detector/base.html' %}

{% block content %}
<div class="auth-wrapper animate-fade">
    <div class="glass-card auth-card" style="border-color: var(--warning);">
        <div style="width: 60px; height: 60px; background: rgba(255, 183, 77, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
            <i class="fas fa-user-md" style="color: var(--warning); font-size: 1.5rem;"></i>
        </div>
        <h2 style="font-size: 1.8rem; margin-bottom: 0.5rem;">Medical Authentication</h2>
        <p style="color: var(--text-gray); margin-bottom: 2rem;">As a licensed professional, please verify your identity to sign this medical record.</p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label style="text-align: center;">6-Digit OTP</label>
                <input type="text" name="otp" class="form-input" placeholder="000000" maxlength="6" style="text-align: center; font-size: 2rem;" required autofocus>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; background: var(--warning); border: none; box-shadow: 0 4px 15px rgba(255, 183, 77, 0.3);">
                Confirm Review <i class="fas fa-check-double" style="margin-left: 10px;"></i>
            </button>
        </form>
    </div>
</div>
{% endblock %}
